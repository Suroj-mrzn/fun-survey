
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
    <link rel="stylesheet" href="style.css">  
  </head>

  <body>
    <h1 id="title">FCC survey form</h1>
<p id="description">Thank you for giving us your time.</p>
<form id="survey-form" action="thanks.html" method="GET">
  <label for="name" id="name-label">Name:</label>
    <input 
    type="text" id="name" name="name"
    placeholder="Enter your name"
    required><br>
<label for="email" id="email-label">Email:</label>
<input 
type="email" name="email" id="email"
placeholder="Enter your mail"
required><br>
<label for="age" id="number-label">Age:</label>
<input type="number" name="age" id="number"
min="3" max="100" placeholder="your age"><br><br>
Which describes you currently?<br><br>
<select id="dropdown">
  <option value="student">Student</option>
  <option value="graduate">Graduate</option>
  <option value="unemployed">Unemployed</option>
  <option value="working">working</option>
  </select><br><br>
 <section> How did u hear about us?<br><br>
  <input type="radio" name="ads" value="ads">
  <label for="ads">Ads</label>
  <input type="radio" name="ads" value="friend">
  <label for="ads">Friend</label>
    <input type="radio" name="ads" value="teacher">
  <label for="teacher">Teacher</label>
  </section><br><br>
  Will you recommend us to others?<br><br>
  <input type="radio" name="recommend" value="yes">
  <label for="yes-option">Yes</label>
   <input type="radio" name="recommend" value="no">
  <label for="no-option">No</label><br><br>
Feedback:
  <textarea></textarea><br><br>
<input type="submit" value="Submit"><label for="submit"></label>
  </form>
  </body>
</html>
